<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .title{font:700 36px Arial, sans-serif; fill:#111}
      .box{fill:#f8fafc; stroke:#334155; stroke-width:3; rx:18; ry:18}
      .box2{fill:#eff6ff; stroke:#2563eb; stroke-width:3; rx:18; ry:18}
      .box3{fill:#ecfdf5; stroke:#059669; stroke-width:3; rx:18; ry:18}
      .box4{fill:#fff7ed; stroke:#ea580c; stroke-width:3; rx:18; ry:18}
      .label{font:700 30px Arial, sans-serif; fill:#111}
      .small{font:700 21px Arial, sans-serif; fill:#333}
      .arrow{stroke:#444; stroke-width:5; fill:none; marker-end:url(#m)}
      .dashed{stroke-dasharray:12 10}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="70" y="70" class="title">Verification Flow and Weight Layers</text>

  <rect x="50" y="170" width="240" height="140" class="box"/>
  <text x="170" y="255" text-anchor="middle" class="label">User joins</text>

  <rect x="330" y="170" width="280" height="140" class="box2"/>
  <text x="470" y="235" text-anchor="middle" class="label">Endorsements</text>
  <text x="470" y="265" text-anchor="middle" class="small">strength + independence</text>
  <text x="470" y="292" text-anchor="middle" class="small">+ relation weighting</text>

  <rect x="670" y="170" width="280" height="140" class="box3"/>
  <text x="810" y="235" text-anchor="middle" class="label">Flow check</text>
  <text x="810" y="265" text-anchor="middle" class="small">capacity-limited</text>
  <text x="810" y="292" text-anchor="middle" class="small">propagation</text>

  <rect x="1010" y="170" width="290" height="140" class="box4"/>
  <text x="1155" y="235" text-anchor="middle" class="label">Consistency</text>
  <text x="1155" y="265" text-anchor="middle" class="small">relationship and</text>
  <text x="1155" y="292" text-anchor="middle" class="small">duplicate check</text>

  <rect x="1340" y="170" width="130" height="140" class="box3"/>
  <text x="1405" y="235" text-anchor="middle" class="label">Canon?</text>
  <text x="1405" y="268" text-anchor="middle" class="small">yes / no</text>

  <path d="M290 240 L326 240" class="arrow"/>
  <path d="M610 240 L666 240" class="arrow"/>
  <path d="M950 240 L1006 240" class="arrow"/>
  <path d="M1300 240 L1336 240" class="arrow"/>

  <rect x="110" y="430" width="400" height="330" class="box"/>
  <text x="310" y="490" text-anchor="middle" class="label">Weight factors</text>
  <text x="145" y="550" class="small">• weak vs strong edge</text>
  <text x="145" y="600" class="small">• independent cluster boost</text>
  <text x="145" y="650" class="small">• optional recency factor</text>
  <text x="145" y="700" class="small">• relationship type</text>

  <rect x="550" y="430" width="400" height="330" class="box"/>
  <text x="750" y="490" text-anchor="middle" class="label">Candidate states</text>
  <text x="585" y="550" class="small">• unverified</text>
  <text x="585" y="600" class="small">• locally verified</text>
  <text x="585" y="650" class="small">• globally contestable</text>
  <text x="585" y="700" class="small">• canonical verified</text>

  <rect x="990" y="430" width="430" height="330" class="box"/>
  <text x="1205" y="490" text-anchor="middle" class="label">What the graph is doing</text>
  <text x="1020" y="550" class="small">The system is not proving legal identity.</text>
  <text x="1020" y="600" class="small">It checks whether trust can concentrate</text>
  <text x="1020" y="650" class="small">enough for one account to become</text>
  <text x="1020" y="700" class="small">the canonical node.</text>
</svg>