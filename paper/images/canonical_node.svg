<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title{font:700 36px Arial, sans-serif; fill:#111}
      .label{font:700 30px Arial, sans-serif; fill:#111}
      .small{font:700 22px Arial, sans-serif; fill:#333}
      .user{fill:#f8fafc; stroke:#334155; stroke-width:3; rx:18; ry:18}
      .canon{fill:#fff7ed; stroke:#c2410c; stroke-width:4; rx:24; ry:24}
      .cluster{fill:#eff6ff; stroke:#2563eb; stroke-width:3; rx:22; ry:22}
      .arrow{stroke:#444; stroke-width:5; fill:none; marker-end:url(#m)}
      .weak{stroke:#64748b; stroke-width:3; fill:none; stroke-dasharray:10 8; marker-end:url(#m)}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="70" y="70" class="title">Canonical Node Emerges From the Graph</text>

  <rect x="110" y="170" width="280" height="170" class="cluster"/>
  <text x="250" y="240" text-anchor="middle" class="label">Cluster A</text>
  <text x="250" y="280" text-anchor="middle" class="small">coworkers /</text>
  <text x="250" y="315" text-anchor="middle" class="small">close peers</text>

  <rect x="110" y="390" width="280" height="170" class="cluster"/>
  <text x="250" y="460" text-anchor="middle" class="label">Cluster B</text>
  <text x="250" y="500" text-anchor="middle" class="small">family /</text>
  <text x="250" y="535" text-anchor="middle" class="small">relatives</text>

  <rect x="110" y="610" width="280" height="170" class="cluster"/>
  <text x="250" y="680" text-anchor="middle" class="label">Cluster C</text>
  <text x="250" y="720" text-anchor="middle" class="small">independent</text>
  <text x="250" y="755" text-anchor="middle" class="small">peers</text>

  <rect x="540" y="330" width="360" height="260" class="canon"/>
  <text x="720" y="425" text-anchor="middle" class="label">Canonical</text>
  <text x="720" y="470" text-anchor="middle" class="label">Verified Account</text>
  <text x="720" y="525" text-anchor="middle" class="small">one account that wins</text>

  <rect x="970" y="170" width="290" height="140" class="user"/>
  <text x="1115" y="240" text-anchor="middle" class="label">Duplicate 1</text>
  <text x="1115" y="285" text-anchor="middle" class="small">underfilled</text>

  <rect x="970" y="410" width="290" height="140" class="user"/>
  <text x="1115" y="480" text-anchor="middle" class="label">Duplicate 2</text>
  <text x="1115" y="525" text-anchor="middle" class="small">contested</text>

  <rect x="970" y="650" width="290" height="140" class="user"/>
  <text x="1115" y="720" text-anchor="middle" class="label">Duplicate 3</text>
  <text x="1115" y="765" text-anchor="middle" class="small">not verified</text>

  <path d="M390 255 L536 410" class="arrow"/>
  <path d="M390 475 L536 455" class="arrow"/>
  <path d="M390 695 L536 505" class="arrow"/>
  <path d="M900 430 L970 250" class="weak"/>
  <path d="M900 470 L970 480" class="weak"/>
  <path d="M900 510 L970 720" class="weak"/>

  <text x="470" y="900" class="small">Independent support converges on one node;</text>
  <text x="470" y="935" class="small">duplicates remain visible but do not become canonical.</text>
</svg>