<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title{font:700 36px Arial, sans-serif; fill:#111}
      .label{font:700 30px Arial, sans-serif; fill:#111}
      .small{font:700 22px Arial, sans-serif; fill:#333}
      .box{fill:#f7f9fc; stroke:#2c3e50; stroke-width:3; rx:18; ry:18}
      .account{fill:#dbeafe; stroke:#1d4ed8; stroke-width:3; rx:20; ry:20}
      .source{fill:#dcfce7; stroke:#15803d; stroke-width:3; rx:24; ry:24}
      .arrow{stroke:#444; stroke-width:5; fill:none; marker-end:url(#m)}
      .thin{stroke:#666; stroke-width:3; fill:none; marker-end:url(#m)}
      .dashed{stroke-dasharray:12 10}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="70" y="70" class="title">Trust Dilution Across Multiple Accounts</text>

  <rect x="90" y="130" width="520" height="760" class="box"/>
  <text x="120" y="185" class="label">Single canonical account</text>
  <circle cx="350" cy="320" r="62" class="source"/>
  <text x="350" y="330" text-anchor="middle" class="label">A</text>
  <rect x="230" y="610" width="240" height="110" class="account"/>
  <text x="350" y="680" text-anchor="middle" class="label">User X</text>
  <path d="M350 388 L350 602" class="arrow"/>
  <text x="390" y="490" class="small">strong trust</text>
  <text x="390" y="520" class="small">concentrates</text>
  <text x="165" y="820" class="small">One bucket fills</text>

  <rect x="720" y="130" width="590" height="760" class="box"/>
  <text x="750" y="185" class="label">Three duplicate accounts</text>
  <circle cx="1010" cy="310" r="62" class="source"/>
  <text x="1010" y="320" text-anchor="middle" class="label">A</text>
  <rect x="790" y="610" width="160" height="110" class="account"/>
  <rect x="975" y="610" width="160" height="110" class="account"/>
  <rect x="1160" y="610" width="160" height="110" class="account"/>
  <text x="870" y="680" text-anchor="middle" class="label">X1</text>
  <text x="1055" y="680" text-anchor="middle" class="label">X2</text>
  <text x="1240" y="680" text-anchor="middle" class="label">X3</text>
  <path d="M1010 378 L870 602" class="thin"/>
  <path d="M1010 378 L1055 602" class="thin"/>
  <path d="M1010 378 L1240 602" class="thin"/>
  <text x="770" y="805" class="small">Trust splits, so no</text>
  <text x="770" y="835" class="small">bucket fills</text>
  <line x1="690" y1="100" x2="690" y2="910" stroke="#e5e7eb" stroke-width="4"/>
  <text x="740" y="875" class="small">Each identity stays underfilled</text>
</svg>